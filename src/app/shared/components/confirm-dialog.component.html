<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button *ngIf="!data.hideCancel" (click)="cancel()">Cancel</button>

  <button mat-raised-button color="primary" (click)="confirm()">
    {{ data.buttonText || "OK" }}
  </button>
</mat-dialog-actions>
