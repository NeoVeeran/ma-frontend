<mat-toolbar color="primary">
  <button mat-icon-button (click)="drawer.toggle()">
    <mat-icon>menu</mat-icon>
  </button>

  <span>Martial Arts Management</span>

  <span class="spacer"></span>

  <button mat-icon-button>
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-drawer-container class="container">
  <mat-drawer #drawer mode="side" opened>
    <mat-nav-list>
      <a mat-list-item routerLink="/students" routerLinkActive="active">
        Students
      </a>

      <a mat-list-item routerLink="/attendance" routerLinkActive="active">
        Attendance
      </a>

      <a mat-list-item routerLink="/fees" routerLinkActive="active"> Fees </a>
    </mat-nav-list>
  </mat-drawer>

  <mat-drawer-content>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-drawer-content>
</mat-drawer-container>
