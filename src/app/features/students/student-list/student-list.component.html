<div class="header">
  <h2>Students</h2>

  <button mat-raised-button color="primary" routerLink="/students/add">
    Add Student
  </button>
</div>

<table mat-table [dataSource]="students">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let student">
      {{ student.id }}
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let student">
      {{ student.name }}
    </td>
  </ng-container>

  <ng-container matColumnDef="beltRank">
    <th mat-header-cell *matHeaderCellDef>Belt Rank</th>
    <td mat-cell *matCellDef="let student">
      {{ student.beltRank }}
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>

    <td mat-cell *matCellDef="let student">
      <button mat-icon-button>
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="deleteStudent(student.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
