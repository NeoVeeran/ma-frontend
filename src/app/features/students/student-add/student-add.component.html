<div class="student-container">
  <mat-card>
    <mat-card-title>
      {{ isEdit ? "Update Student" : "Add Student" }}
    </mat-card-title>

    <mat-card-content>
      <form [formGroup]="form">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Belt Rank</mat-label>

          <mat-select formControlName="beltRank">
            <mat-option
              *ngFor="let belt of belts; trackBy: trackByValue"
              [value]="belt"
            >
              {{ belt }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="submit()">
          {{ isEdit ? "Update" : "Save" }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
