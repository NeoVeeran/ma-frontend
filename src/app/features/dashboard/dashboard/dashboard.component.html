<div class="dashboard-container">
  <h1 class="page-title">Dashboard</h1>

  <p class="page-subtitle">Welcome to the Martial Arts Management System</p>

  <div class="cards">
    <mat-card class="card students">
      <mat-card-content>
        <div class="card-header">
          <span>Total Students</span>
        </div>

        <h1>{{ dashboard?.totalStudents }}</h1>
      </mat-card-content>
    </mat-card>

    <mat-card class="card present">
      <mat-card-content>
        <div class="card-header">
          <span>Present Today</span>
        </div>

        <h1>{{ dashboard?.presentToday }}</h1>
      </mat-card-content>
    </mat-card>

    <mat-card class="card absent">
      <mat-card-content>
        <div class="card-header">
          <span>Absent Today</span>
        </div>

        <h1>{{ dashboard?.absentToday }}</h1>
      </mat-card-content>
    </mat-card>

    <mat-card class="card fees">
      <mat-card-content>
        <div class="card-header">
          <span>Fees Pending</span>
        </div>

        <h1>{{ dashboard?.feesPending }}</h1>
      </mat-card-content>
    </mat-card>
  </div>
</div>
