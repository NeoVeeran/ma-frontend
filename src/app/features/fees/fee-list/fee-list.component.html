<div class="header">
  <h2>Fees</h2>

  <button mat-raised-button color="primary" routerLink="/fees/add">
    Add Fee
  </button>
</div>

<table mat-table [dataSource]="fees" class="mat-elevation-z8">
  <ng-container matColumnDef="studentName">
    <th mat-header-cell *matHeaderCellDef>Student</th>

    <td mat-cell *matCellDef="let fee">
      {{ fee.studentName }}
    </td>
  </ng-container>

  <ng-container matColumnDef="amount">
    <th mat-header-cell *matHeaderCellDef>Amount</th>

    <td mat-cell *matCellDef="let fee">₹ {{ fee.amount }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>

    <td mat-cell *matCellDef="let fee">
      <span [style.color]="fee.paid ? 'green' : 'red'">
        {{ fee.paid ? "Paid" : "Pending" }}
      </span>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>

    <td mat-cell *matCellDef="let fee">
      <button
        mat-icon-button
        color="primary"
        [routerLink]="['/fees/edit', fee.id]"
      >
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="deleteFee(fee.id!)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
