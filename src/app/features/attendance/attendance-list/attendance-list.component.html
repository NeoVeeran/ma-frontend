<div class="header">
  <div>
    <h2>Attendance</h2>

    <p>Track daily attendance records</p>
  </div>

  <button mat-raised-button color="primary" routerLink="/attendance/add">
    Mark Attendance
  </button>
</div>
<table mat-table [dataSource]="attendanceList" class="mat-elevation-z8">
  <!-- Student Name -->
  <ng-container matColumnDef="studentName">
    <th mat-header-cell *matHeaderCellDef>Student</th>

    <td mat-cell *matCellDef="let attendance">
      {{ attendance.student.name }}
    </td>
  </ng-container>

  <!-- Date -->
  <ng-container matColumnDef="attendanceDate">
    <th mat-header-cell *matHeaderCellDef>Date</th>

    <td mat-cell *matCellDef="let attendance">
      {{ attendance.attendanceDate | date: "dd MMM yyyy" }}
    </td>
  </ng-container>

  <!-- Present -->
  <ng-container matColumnDef="present">
    <th mat-header-cell *matHeaderCellDef>Present</th>

    <td mat-cell *matCellDef="let attendance">
      <span
        class="status"
        [ngClass]="attendance.present ? 'present' : 'absent'"
      >
        {{ attendance.present ? "Present" : "Absent" }}
      </span>
    </td>
  </ng-container>

  <!-- Actions -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>

    <td mat-cell *matCellDef="let attendance">
      <button
        mat-icon-button
        color="primary"
        [routerLink]="['/attendance/edit', attendance.id]"
      >
        <mat-icon>edit</mat-icon>
      </button>

      <button
        mat-icon-button
        color="warn"
        (click)="deleteAttendance(attendance.id!)"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
<div class="empty-state" *ngIf="attendanceList.length === 0">
  <mat-icon>event_busy</mat-icon>

  <h3>No Attendance Records</h3>

  <p>Start marking attendance.</p>
</div>
